<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | iData Global</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta
      name="description"
      content="The page you requested could not be found. Return to iData Global and continue browsing our published content."
    />
    <link rel="icon" href="/favicon.svg" />
    <script>
      (function () {
        var path = window.location.pathname;
        var hasLanguagePrefix = path === '/en' || path === '/es' || path.startsWith('/en/') || path.startsWith('/es/');
        var isAdminRoute = path === '/admin' || path.startsWith('/admin/');

        if (!hasLanguagePrefix && !isAdminRoute) {
          var normalizedPath = path === '/' ? '/en/' : '/en' + path;
          window.location.replace(normalizedPath + window.location.search + window.location.hash);
        }
      })();
    </script>
    <script>
      (function () {
        var storageKey = 'idata-theme';
        var storedTheme = window.localStorage.getItem(storageKey);
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : (prefersDark ? 'dark' : 'light');
        var root = document.documentElement;
        root.dataset.theme = theme;
        root.style.colorScheme = theme;
        if (theme === 'dark') {
          root.classList.add('dark');
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --blue: #4387df;
        --ink: #0f172a;
        --muted: #475569;
        --line: rgba(148, 163, 184, 0.28);
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: rgba(255,255,255,0.84);
        --page:
          radial-gradient(circle at top left, rgba(67, 135, 223, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(142, 50, 245, 0.08), transparent 30%),
          linear-gradient(180deg, #ffffff, #f6f9fc 70%, #eef5ff);
        --card-bg: radial-gradient(circle at top left, rgba(67, 135, 223, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(142, 50, 245, 0.12), transparent 30%),
          var(--surface);
        --shadow: 0 18px 60px rgba(15, 23, 42, 0.1);
      }
      :root.dark {
        color-scheme: dark;
        --ink: #f8fafc;
        --muted: #b7c9dc;
        --line: rgba(148, 163, 184, 0.24);
        --surface: rgba(15, 23, 42, 0.82);
        --surface-strong: rgba(15, 23, 42, 0.9);
        --page:
          radial-gradient(circle at top left, rgba(67, 135, 223, 0.18), transparent 24%),
          radial-gradient(circle at bottom right, rgba(142, 50, 245, 0.14), transparent 28%),
          linear-gradient(180deg, #08111f, #0b1526 64%, #0e1a2f);
        --card-bg: radial-gradient(circle at top left, rgba(67, 135, 223, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(142, 50, 245, 0.12), transparent 30%),
          var(--surface);
        --shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--page);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(960px, 100%);
        background: var(--card-bg);
        border: 1px solid var(--line);
        border-radius: 32px;
        box-shadow: var(--shadow);
        padding: 32px;
        position: relative;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 14px;
        color: var(--muted);
        backdrop-filter: blur(16px);
      }
      h1 {
        margin: 20px 0 0;
        font-size: clamp(44px, 6vw, 72px);
        line-height: 1.02;
        font-weight: 300;
        letter-spacing: -0.04em;
      }
      p {
        margin: 20px 0 0;
        max-width: 720px;
        font-size: 18px;
        line-height: 1.8;
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }
      a {
        text-decoration: none;
      }
      .primary, .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        padding: 14px 22px;
        font-weight: 600;
      }
      .primary {
        background: linear-gradient(90deg, #4387df, #3575cc);
        color: #fff;
      }
      .secondary {
        background: var(--surface-strong);
        color: var(--blue);
        border: 1px solid var(--line);
      }
      .text {
        display: inline-flex;
        align-items: center;
        color: var(--ink);
        padding: 14px 4px;
        font-weight: 600;
      }
      .theme-toggle {
        position: absolute;
        top: 24px;
        right: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--ink);
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .theme-toggle:hover {
        transform: translateY(-1px);
      }
      .theme-icon {
        width: 18px;
        text-align: center;
      }
      @media (max-width: 640px) {
        .card {
          padding: 24px;
        }
        .theme-toggle {
          position: static;
          margin-bottom: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle color mode">
        <span class="theme-icon" id="theme-icon">☾</span>
        <span id="theme-label">Dark</span>
      </button>
      <div class="eyebrow">Error 404</div>
      <h1>Page not found</h1>
      <p>
        The URL you tried to open does not exist or has moved. Return to the homepage, explore our services or contact us.
      </p>
      <div class="actions">
        <a class="primary" href="/en/">Go home</a>
        <a class="secondary" href="/en/services">View services</a>
        <a class="text" href="/en/contact">Contact us</a>
      </div>
    </main>
    <script>
      (function () {
        var storageKey = 'idata-theme';
        var root = document.documentElement;
        var toggle = document.getElementById('theme-toggle');
        var icon = document.getElementById('theme-icon');
        var label = document.getElementById('theme-label');

        function renderTheme(theme) {
          var isDark = theme === 'dark';
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
          root.classList.toggle('dark', isDark);
          icon.textContent = isDark ? '☀' : '☾';
          label.textContent = isDark ? 'Light' : 'Dark';
        }

        renderTheme(root.dataset.theme || 'light');

        toggle.addEventListener('click', function () {
          var nextTheme = root.classList.contains('dark') ? 'light' : 'dark';
          window.localStorage.setItem(storageKey, nextTheme);
          renderTheme(nextTheme);
        });
      })();
    </script>
  </body>
</html>
